name: AI Infra Research Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-research-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate research reports
        run: python scripts/run_daily_pipeline.py

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-infra-research-output
          path: |
            data/processed/*.csv
            reports/daily/*.md
            reports/weekly/*.md
            reports/event/*.md
          if-no-files-found: error
